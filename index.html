<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🏠 The Garage</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06070e;--pnl:#0c0d16;--card:#0f1019;--bdr:#181929;
  --amb:#f5a100;--amb2:#ffc240;--red:#e94444;--grn:#17c97f;
  --blu:#4ca8f7;--txt:#dde2f0;--t2:#7c8499;--t3:#3a4158;--muted:#1a1d2a;
}
body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
a{color:var(--amb);text-decoration:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--pnl)}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;padding:24px;text-align:center}
.spinner{width:28px;height:28px;border:2px solid var(--bdr);border-top-color:var(--amb);border-radius:50%;animation:spin .8s linear infinite}
.lbl{font-size:11px;color:var(--t2);letter-spacing:.12em}
@keyframes spin{to{transform:rotate(360deg)}}
.hdr{background:var(--pnl);border-bottom:1px solid var(--bdr);padding:12px 16px;position:sticky;top:0;z-index:10}
.back-btn{background:none;border:none;color:var(--amb);font-size:20px;padding:0 4px;line-height:1;flex-shrink:0;cursor:pointer}
.hdr-title{font-size:15px;font-weight:700;flex:1}
.hdr-sub{font-size:11px;color:var(--t2);margin-top:2px}
.wrap{padding:14px 16px;max-width:640px;margin:0 auto;padding-bottom:80px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:8px;margin-bottom:10px;overflow:hidden}
.sub-card{background:#0a0b14;border:1px solid var(--bdr);border-radius:6px;padding:10px 12px;margin-bottom:8px}
.sub-card-hl{background:#1a1200;border-color:color-mix(in srgb,var(--amb) 40%,transparent)}
.sub-card-red{background:#1a0000;border-color:color-mix(in srgb,var(--red) 40%,transparent)}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.tag-amb{background:color-mix(in srgb,var(--amb) 15%,transparent);color:var(--amb);border:1px solid color-mix(in srgb,var(--amb) 30%,transparent)}
.tag-red{background:color-mix(in srgb,var(--red) 15%,transparent);color:var(--red);border:1px solid color-mix(in srgb,var(--red) 30%,transparent)}
.tag-grn{background:color-mix(in srgb,var(--grn) 15%,transparent);color:var(--grn);border:1px solid color-mix(in srgb,var(--grn) 30%,transparent)}
.tag-blu{background:color-mix(in srgb,var(--blu) 15%,transparent);color:var(--blu);border:1px solid color-mix(in srgb,var(--blu) 30%,transparent)}
.tag-dim{background:color-mix(in srgb,var(--t3) 20%,transparent);color:var(--t2);border:1px solid color-mix(in srgb,var(--t3) 30%,transparent)}
.tag-ghost{background:transparent;color:var(--t3);border:1px solid var(--bdr)}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.sec-head{font-size:10px;color:var(--t2);letter-spacing:.1em;font-weight:700;text-transform:uppercase;margin:16px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--bdr)}
.part-brand{font-size:13px;color:var(--txt);font-weight:600}
.part-pn{font-size:11px;color:var(--amb2);font-family:'Courier New',monospace;letter-spacing:.03em}
.part-note{font-size:11px;color:var(--t2);margin:3px 0;line-height:1.5}
.part-note-warn{color:var(--red)}
.links{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.link-btn{font-size:10px;color:var(--amb);padding:3px 8px;border:1px solid color-mix(in srgb,var(--amb) 30%,transparent);border-radius:3px;display:inline-flex;gap:4px;align-items:center}
.link-dim{color:var(--t2);border-color:color-mix(in srgb,var(--t2) 20%,transparent)}
.link-price{color:var(--t2)}
.tabs{display:flex;gap:1px;overflow-x:auto;margin-top:10px;border-bottom:1px solid var(--bdr)}
.tab-btn{padding:8px 13px;border:none;border-bottom:2px solid transparent;background:none;color:var(--t2);font-size:11px;font-weight:700;letter-spacing:.05em;white-space:nowrap}
.tab-btn.active{color:var(--amb);border-bottom-color:var(--amb)}
.cat-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat-btn{padding:6px 11px;border-radius:4px;border:1px solid var(--bdr);background:none;color:var(--t2);font-size:11px;display:flex;gap:4px;align-items:center}
.cat-btn.active{border-color:var(--amb);background:color-mix(in srgb,var(--amb) 8%,transparent);color:var(--amb)}
.inp{background:#0a0b14;border:1px solid #1e2030;border-radius:5px;padding:9px 11px;color:var(--txt);font-size:13px;width:100%;outline:none}
.inp:focus{border-color:color-mix(in srgb,var(--amb) 50%,transparent)}
.btn-primary{padding:11px 20px;border-radius:4px;border:none;background:var(--amb);color:#000;font-size:12px;font-weight:700;letter-spacing:.05em;cursor:pointer}
.btn-ghost{padding:11px 16px;border-radius:4px;border:1px solid var(--bdr);background:none;color:var(--t2);font-size:12px;cursor:pointer}
.btn-sm{padding:6px 13px;border-radius:4px;border:none;background:var(--amb);color:#000;font-size:11px;font-weight:700;letter-spacing:.04em;cursor:pointer}
.btn-sm-ghost{padding:6px 12px;border-radius:4px;border:1px solid var(--bdr);background:none;color:var(--t2);font-size:10px;letter-spacing:.06em;cursor:pointer}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:10px;color:var(--t2);letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
.row2{display:flex;gap:10px}.row2>*{flex:1}
.fleet-stats{display:grid;grid-template-columns:repeat(4,1fr);margin-top:12px;border:1px solid var(--bdr);border-radius:6px;overflow:hidden}
.fstat{padding:10px 12px;border-right:1px solid var(--bdr);text-align:center}
.fstat:last-child{border-right:none}
.fstat-lbl{font-size:9px;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.fstat-val{font-size:16px;font-weight:700}
.spot-badge{background:var(--amb);color:#000;font-size:9px;font-weight:800;letter-spacing:.08em;padding:2px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.spot-badge-dim{background:var(--muted);color:var(--t3)}
.warn-box{background:#0f0a00;border:1px solid color-mix(in srgb,var(--amb) 30%,transparent);border-radius:6px;padding:9px 13px;margin-bottom:14px;font-size:11px;color:var(--t2);line-height:1.6}
.blank-box{background:#0a0f1a;border:1px solid color-mix(in srgb,var(--blu) 25%,transparent);border-radius:6px;padding:10px 13px;margin-bottom:14px}
.note-box{background:#1a0d00;border:1px solid color-mix(in srgb,var(--amb) 30%,transparent);border-radius:6px;padding:12px 14px;margin-top:12px}
.note-box-head{font-size:10px;color:var(--amb);letter-spacing:.08em;font-weight:700;margin-bottom:6px}
.note-box-txt{font-size:12px;color:var(--txt);line-height:1.7;white-space:pre-wrap}
.video-box{background:#0a0f0a;border:1px solid color-mix(in srgb,var(--grn) 25%,transparent);border-radius:6px;padding:11px 13px;margin-top:16px}
.video-link{display:flex;align-items:center;gap:8px;background:#0c150c;border:1px solid color-mix(in srgb,var(--grn) 20%,transparent);border-radius:4px;padding:7px 10px;text-decoration:none;margin-bottom:5px}
.spec-row{display:flex;padding:9px 14px;border-bottom:1px solid var(--bdr)}
.spec-key{font-size:10px;color:var(--t2);letter-spacing:.07em;text-transform:uppercase;min-width:140px;flex-shrink:0;padding-top:2px}
.spec-val{font-size:13px;font-family:'Courier New',monospace;line-height:1.5}
.spec-val-warn{color:var(--red)}
.log-row{background:#0a0b14;border:1px solid var(--bdr);border-radius:6px;padding:10px 13px;margin-bottom:8px}
.log-svc{font-size:12px;color:var(--amb);font-weight:600}
.log-cost{font-size:11px;color:var(--grn);font-family:'Courier New',monospace}
.log-meta{font-size:11px;color:var(--t2);display:flex;gap:12px;flex-wrap:wrap;margin-top:3px}
.log-note{font-size:11px;color:var(--txt);line-height:1.5;margin-top:4px}
.add-dashed{width:100%;background:none;border:2px dashed var(--bdr);border-radius:8px;padding:16px;text-align:center;color:var(--t2);font-size:12px;letter-spacing:.06em;margin-top:6px;cursor:pointer}
.alert-item{border-radius:6px;padding:9px 13px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.alert-overdue{background:color-mix(in srgb,var(--red) 10%,transparent);border:1px solid color-mix(in srgb,var(--red) 30%,transparent)}
.alert-soon{background:color-mix(in srgb,var(--amb) 8%,transparent);border:1px solid color-mix(in srgb,var(--amb) 25%,transparent)}
.all-good{background:color-mix(in srgb,var(--grn) 8%,transparent);border:1px solid color-mix(in srgb,var(--grn) 25%,transparent);border-radius:6px;padding:12px 16px;margin-bottom:16px;text-align:center}
.intv-row{background:#0a0b14;border:1px solid var(--bdr);border-radius:5px;padding:8px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;margin-top:10px}
.filter-btn{padding:5px 11px;border-radius:3px;border:1px solid var(--bdr);background:none;color:var(--t2);font-size:10px;white-space:nowrap;cursor:pointer}
.filter-btn.active{border-color:var(--amb);background:color-mix(in srgb,var(--amb) 8%,transparent);color:var(--amb)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);display:inline-block;margin-left:6px;box-shadow:0 0 6px var(--grn)}
.tip-box{background:#0e100a;border:1px solid color-mix(in srgb,var(--grn) 25%,transparent);border-radius:6px;padding:10px 14px;margin-bottom:20px}
/* vehicle photo / silhouette */
.vh-photo-wrap{width:100%;height:100px;position:relative;overflow:hidden}
.vh-photo{width:100%;height:100%;object-fit:cover;display:block}
.vh-silhouette{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.vh-sil-icon{font-size:40px;line-height:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.vh-sil-label{font-size:9px;letter-spacing:.12em;font-weight:700;text-transform:uppercase;opacity:.6}
.card-body{padding:12px 14px}
@media(max-width:400px){.fleet-stats{grid-template-columns:repeat(2,1fr)}.fstat:nth-child(2){border-right:none}.fstat:nth-child(3){border-top:1px solid var(--bdr)}.fstat:nth-child(4){border-top:1px solid var(--bdr);border-right:none}}
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <div class="lbl" id="load-lbl">🏠 LOADING THE GARAGE…</div>
</div>
<div id="app" style="display:none"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,collection,doc,setDoc,addDoc,updateDoc,onSnapshot,query,orderBy,getDocs,writeBatch,getDoc}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const fbApp=initializeApp({
  apiKey:"AIzaSyD4sExGNd-1dcrputWPtcqJGE3U0mKqi6k",
  authDomain:"fleetmasterai.firebaseapp.com",
  projectId:"fleetmasterai",
  storageBucket:"fleetmasterai.firebasestorage.app",
  messagingSenderId:"878453004926",
  appId:"1:878453004926:web:4bc2332dd0237ea371562f"
});
const db=getFirestore(fbApp);
const vcol=collection(db,'vehicles');
const lcol=collection(db,'logs');
const metaRef=doc(db,'meta','version');

// ── Bump this to force a full database refresh when seed data changes ─────────
const DATA_VERSION=10;

// ── Device-local hide list (each person hides independently) ─────────────────
const getHidden=()=>{try{return JSON.parse(localStorage.getItem('garage_hidden')||'[]');}catch{return[];}};
const setHidden=arr=>localStorage.setItem('garage_hidden',JSON.stringify(arr));
const isHidden=id=>getHidden().includes(id);
function toggleHide(id){const h=getHidden();const i=h.indexOf(id);if(i>-1)h.splice(i,1);else h.push(id);setHidden(h);}

// ── Helpers ───────────────────────────────────────────────────────────────────
const enc=s=>encodeURIComponent(s);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function tag(cls,txt){return`<span class="tag ${cls}">${esc(txt)}</span>`;}

// ── Store link builder ────────────────────────────────────────────────────────
// All links are year+make+model+part specific for search precision
function storeURL(store,q){
  switch(store){
    case'AutoZone':  return`https://www.autozone.com/search?q=${enc(q)}`;
    case'Amazon':    return`https://www.amazon.com/s?k=${enc(q)}`;
    case'RockAuto':  return`https://www.rockauto.com/en/catalog/`;
    case'Tire Rack': return`https://www.tirerack.com/tires/TireSearchResults.jsp?width=${(q.split('/')[0]||'').replace(/\D/g,'')}&rec=false&searchBySize=true`;
    case"O'Reilly":  return`https://www.oreillyauto.com/shop/b/search?q=${enc(q)}`;
    case'NAPA':      return`https://www.napaonline.com/search?q=${enc(q)}`;
    case'Walmart':   return`https://www.walmart.com/search?q=${enc(q)}`;
    case'FCP Euro':  return`https://www.fcpeuro.com/search?q=${enc(q)}`;
    case'ECS Tuning':return`https://www.ecstuning.com/Search/?search=${enc(q)}`;
    case'Advance':   return`https://shop.advanceautoparts.com/find/q=${enc(q)}`;
    default: return'#';
  }
}
const L=(store,q,price)=>({store,price,url:storeURL(store,q)});

function autoLinks(brand,pn,have=[]){
  if(!pn||pn==='—')return[];
  const q=`${brand} ${pn}`.trim();
  const s=new Set((have||[]).map(l=>l.store));
  return['AutoZone',"O'Reilly",'NAPA','Walmart'].filter(x=>!s.has(x)).map(x=>({store:x,price:null,url:storeURL(x,q)}));
}

// ── Service intervals ─────────────────────────────────────────────────────────
const INTERVALS={
  'Oil Change':{mi:5000,mo:6},'Air Filter':{mi:20000,mo:24},
  'Cabin Air Filter':{mi:15000,mo:12},'Fuel Filter':{mi:20000,mo:24},
  'Spark Plugs':{mi:60000,mo:48},'Timing Belt Kit':{mi:40000,mo:48},
  'Tire Rotation':{mi:6000,mo:6},'Wheel Alignment':{mi:12000,mo:12},
  'Transmission Service':{mi:30000,mo:36},'CVT Service':{mi:30000,mo:36},
  'DSG / CVT Fluid':{mi:40000,mo:48},
  'Coolant Flush':{mi:50000,mo:60},'Brake Fluid Flush':{mi:30000,mo:24},
  'Serpentine Belt':{mi:60000,mo:60},'Battery Replacement':{mi:null,mo:48},
  'Shocks / Struts':{mi:50000,mo:60},
  'Front Differential':{mi:30000,mo:36},'Rear Differential':{mi:30000,mo:36},
  'Transfer Case Service':{mi:30000,mo:36},
};
const SERVICE_TYPES=[
  'Oil Change','Air Filter','Cabin Air Filter','Fuel Filter','Glow Plugs','Spark Plugs',
  'Ignition Coils','PCV Valve','Throttle Body Service','Timing Belt Kit','Timing Chain Service',
  'Brake Pads – Front','Brake Pads – Rear','Brake Rotors – Front','Brake Rotors – Rear',
  'Brake Shoes – Rear','Brake Drums – Rear','Brake Fluid Flush','Brake Calipers',
  'Tire Rotation','Tire Balance','New Tires Installed','Wheel Alignment','TPMS Service',
  'Transmission Service','CVT Service','Transfer Case Service','DSG / CVT Fluid',
  'Front Differential','Rear Differential','4WD Service',
  'Coolant Flush','Thermostat','Water Pump','Radiator Hoses','Radiator',
  'Serpentine Belt','Idler/Tensioner Pulley','Battery Replacement','Battery Test',
  'Alternator','Starter','Power Steering Flush','Power Steering Pump','Rack & Pinion',
  'Fuel Injectors','Fuel Pump','Fuel Tank/Lines',
  'Front Suspension','Rear Suspension','Shocks / Struts','Control Arm Replacement',
  'Ball Joints','Tie Rod Ends','CV Axle / Boot','U-Joint','Sway Bar Links',
  'Wheel Bearing / Hub','AC Recharge','AC Compressor','Blower Motor',
  'Catalytic Converter','O2 / Lambda Sensor','EGR Service','DPF Service',
  'Turbocharger Service','Turbo Rebuild','Intercooler',
  'Engine Replacement','Engine Rebuild','Head Gasket','Carbon Cleaning (DI)',
  'Valve Cover Gasket','Exhaust Repair','Muffler',
  'Windshield Wipers','Headlights','Taillights','Bulb Replacement',
  'Windshield / Glass','Touch-up Paint','Wash / Detail',
  'State Inspection','Emissions Test','Pre-Trip Inspection','Other',
];
const VID_TOPICS={
  oilFilters:{t:'oil change',l:'Oil Change'},airFilters:{t:'air filter replacement',l:'Air Filter'},
  cabinFilters:{t:'cabin air filter',l:'Cabin Air Filter'},fuelFilter:{t:'fuel filter replacement',l:'Fuel Filter'},
  sparkPlugs:{t:'spark plug replacement',l:'Spark Plugs'},glowPlugs:{t:'glow plug replacement diesel',l:'Glow Plugs'},
  timingBelt:{t:'timing belt replacement',l:'Timing Belt'},brakes:{t:'brake pad rotor replacement',l:'Brake Job'},
  battery:{t:'car battery replacement',l:'Battery'},tires:{t:'tire rotation balance',l:'Tires'},
  transmissionFluid:{t:'transmission fluid change',l:'Trans Fluid'},coolant:{t:'coolant flush',l:'Coolant Flush'},
  differentialFluid:{t:'differential fluid change',l:'Diff Fluid'},
};

// ── Body type → silhouette config ─────────────────────────────────────────────
const BODY_STYLES={
  truck:    {icon:'🛻',label:'PICKUP TRUCK',   bg:'linear-gradient(135deg,#1a1000,#0e0900)',border:'#3d2a00'},
  largesuv: {icon:'🚙',label:'FULL-SIZE SUV',  bg:'linear-gradient(135deg,#001a10,#000e08)',border:'#00402a'},
  suv:      {icon:'🚙',label:'SUV',            bg:'linear-gradient(135deg,#001220,#000a14)',border:'#003060'},
  sedan:    {icon:'🚗',label:'SEDAN',          bg:'linear-gradient(135deg,#100018,#08000f)',border:'#300040'},
  minivan:  {icon:'🚐',label:'MINIVAN',        bg:'linear-gradient(135deg,#001a1a,#000e0e)',border:'#004040'},
  compactsuv:{icon:'🚙',label:'COMPACT SUV',   bg:'linear-gradient(135deg,#1a1000,#0e0900)',border:'#3d2a00'},
};
function getBodyStyle(v){
  if(v.bodyType&&BODY_STYLES[v.bodyType])return BODY_STYLES[v.bodyType];
  const m=(v.model||'').toLowerCase();
  if(m.includes('navigator')||m.includes('expedition')||m.includes('suburban')||m.includes('tahoe')||m.includes('yukon')||m.includes('sequoia'))return BODY_STYLES.largesuv;
  if(m.includes('sedona')||m.includes('sienna')||m.includes('odyssey')||m.includes('caravan'))return BODY_STYLES.minivan;
  if(m.includes('patriot')||m.includes('compass')||m.includes('crv')||m.includes('rav4'))return BODY_STYLES.compactsuv;
  if(m.includes('f-150')||m.includes('silverado')||m.includes('tacoma')||m.includes('ram')||m.includes('frontier')||m.includes('ranger')||m.includes('tundra')||m.includes('sierra'))return BODY_STYLES.truck;
  if(m.includes('fusion')||m.includes('passat')||m.includes('camry')||m.includes('accord')||m.includes('altima')||m.includes('malibu'))return BODY_STYLES.sedan;
  const t=(v.trim||'').toLowerCase();
  if(t.includes('suv')||t.includes('crossover')||t.includes('sport'))return BODY_STYLES.suv;
  return BODY_STYLES.suv;
}
function renderVehiclePhoto(v,height='100px'){
  const bs=getBodyStyle(v);
  if(v.photoUrl){
    return`<div class="vh-photo-wrap" style="height:${height}"><img class="vh-photo" src="${esc(v.photoUrl)}" onerror="this.parentNode.innerHTML='<div class=vh-silhouette style=height:${height};background:${bs.bg}><span class=vh-sil-icon>${bs.icon}</span><span class=vh-sil-label>${bs.label}</span></div>'" loading="lazy"></div>`;
  }
  return`<div class="vh-silhouette" style="height:${height};background:${bs.bg};border-bottom:1px solid ${bs.border}"><span class="vh-sil-icon">${bs.icon}</span><span class="vh-sil-label">${bs.label}</span></div>`;
}

// ── Empty templates ───────────────────────────────────────────────────────────
const EP=()=>({
  oilFilters:[],airFilters:[],cabinFilters:[],sparkPlugs:[],
  glowPlugs:[],timingBelt:[],fuelFilter:[],
  brakes:{frontPads:[],rearPads:[],rearShoes:[],rearDrums:[],frontRotors:[],rearRotors:[]},
  battery:[],tires:{size:'',psi:'',notes:'',options:[]},
  transmissionFluid:[],coolant:[],differentialFluid:[],
});
const ES=()=>({hp:'',torque:'',trans:'',drive:'',fuelCap:'',oilCap:'',oilType:'',
  coolantCap:'',tireSize:'',battGrp:'',tirePSI:'— see door placard',sparkPlugGap:'',towCap:''});

// ── SEED VEHICLES — all specs verified from Edmunds, JD Power, KBB ────────────
const SV=[
// ═══════════════════════════════════════════════════════════════════
// V1 — 2008 Ford F-150 Limited
// Source: Edmunds.com SuperCrew Limited spec sheet (direct fetch)
// HP 300, Torque 365@3750, Trans 4R75E 4-spd auto, RWD confirmed from VIN
// Fuel tank 30.0 gal, Tow 9500 lbs, Tires P275/45R22 on factory 22" wheels
// ═══════════════════════════════════════════════════════════════════
{id:'v1',nickname:'#1 – 2008 F-150 Limited',year:2008,make:'Ford',model:'F-150',trim:'Limited',

// ── App state ─────────────────────────────────────────────────────────────────
const S={
  vehicles:[],logs:[],
  screen:'dashboard',vehicleId:null,tab:'specs',catKey:'oilFilters',
  logFilter:'all',addLogVehicleId:null,showHidden:false,loaded:false,
};

// ── Firebase ops ──────────────────────────────────────────────────────────────
function setLoad(m){const e=document.getElementById('load-lbl');if(e)e.textContent=m;}

async function seedDB(){
  setLoad('🔄 UPDATING VEHICLE DATABASE…');
  const b=writeBatch(db);
  (await getDocs(vcol)).docs.forEach(d=>b.delete(d.ref));
  (await getDocs(lcol)).docs.forEach(d=>b.delete(d.ref));
  SV.forEach(v=>b.set(doc(vcol,v.id),v));
  SL.forEach((l,i)=>b.set(doc(lcol,`log_${String(i+1).padStart(3,'0')}`),l));
  b.set(metaRef,{version:DATA_VERSION,seeded:new Date().toISOString()});
  await b.commit();
}

async function initDB(){
  setLoad('🔄 CHECKING DATABASE VERSION…');
  try{
    const s=await getDoc(metaRef);
    if(!s.exists()||s.data().version!==DATA_VERSION)await seedDB();
  }catch{await seedDB();}
}

function listenDB(){
  onSnapshot(vcol,snap=>{
    S.vehicles=snap.docs.map(d=>({...d.data(),id:d.id}));
    S.vehicles.sort((a,b)=>(parseInt(a.id.replace('v',''))||0)-(parseInt(b.id.replace('v',''))||0));
    if(S.loaded)render();
  });
  onSnapshot(query(lcol,orderBy('date','desc')),snap=>{
    S.logs=snap.docs.map(d=>({...d.data(),id:d.id}));
    if(S.loaded)render();
  });
}

async function saveVehicle(data){
  const clean=JSON.parse(JSON.stringify(data));
  if(clean.id){
    await setDoc(doc(vcol,clean.id),clean);
  } else {
    const id='v'+Date.now();
    clean.id=id;
    clean.parts=EP();
    clean.specs=ES();
    await setDoc(doc(vcol,id),clean);
  }
  return clean.id;
}

async function saveLog(data){
  const ref=await addDoc(lcol,JSON.parse(JSON.stringify(data)));
  const mi=Number(data.mileage)||0;
  const v=S.vehicles.find(x=>x.id===data.vehicleId);
  if(v&&mi>(Number(v.currentMileage)||0))
    await updateDoc(doc(vcol,data.vehicleId),{currentMileage:mi});
  return ref.id;
}

// ── Nav / helpers ─────────────────────────────────────────────────────────────
function nav(screen,opts={}){Object.assign(S,{screen,...opts});render();window.scrollTo(0,0);}
function lastLog(vid,svc){return S.logs.filter(l=>l.vehicleId===vid&&l.service===svc).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];}

function dueAlerts(v){
  const alerts=[],now=new Date();
  Object.entries(INTERVALS).forEach(([svc,{mi:iMi,mo:iMo}])=>{
    const last=lastLog(v.id,svc);if(!last)return;
    const pct=Math.max(iMi?((v.currentMileage||0)-last.mileage)/iMi:0,iMo?((now-new Date(last.date))/(1000*60*60*24*30.44))/iMo:0);
    if(pct>=1)alerts.push({svc,status:'overdue',pct});
    else if(pct>=0.8)alerts.push({svc,status:'due soon',pct});
  });
  return alerts.sort((a,b)=>b.pct-a.pct);
}

  if(!links||!links.length)return'';

// ── SCREEN: Specs Tab ─────────────────────────────────────────────────────────
function renderSpecsTab(v){
  const labels={hp:'HP / POWER',torque:'TORQUE',trans:'TRANSMISSION',drive:'DRIVE TYPE',
    fuelCap:'FUEL CAPACITY',oilCap:'OIL CAPACITY',oilType:'OIL TYPE',coolantCap:'COOLANT CAP',
    tireSize:'TIRE SIZE',battGrp:'BATTERY GROUP',tirePSI:'TIRE PSI',sparkPlugGap:'PLUG GAP',towCap:'TOW CAPACITY'};
  const specs=v.specs||{};
  const filled=Object.entries(specs).filter(([,val])=>val&&String(val).trim()!=='');
  const blanks=Object.entries(labels).filter(([k])=>!specs[k]||String(specs[k]).trim()==='').map(([k])=>labels[k]);
  const tbl=filled.length?`<div style="background:#0a0b14;border:1px solid var(--bdr);border-radius:6px;overflow:hidden;margin-bottom:14px">
    ${filled.map(([k,val],i)=>{
      const w=String(val).includes('MANDATORY')||String(val).includes('ONLY')||String(val).includes('confirm')||String(val).includes('placard')||String(val).includes('notes');
      return`<div class="spec-row" style="${i===0?'border-top:none':''}">
        <div class="spec-key">${esc(labels[k]||k)}</div>
        <div class="spec-val${w?' spec-val-warn':''}">${esc(val)}</div>
      </div>`;
    }).join('')}
  </div>`:'';
  const bk=blanks.length?`<div class="blank-box"><div style="font-size:10px;color:var(--blu);letter-spacing:.08em;font-weight:700;margin-bottom:5px">FIELDS AWAITING YOUR DATA</div><div style="font-size:11px;color:var(--t2);line-height:1.7">${blanks.join(' · ')}</div></div>`:'';
  const wn=`<div class="warn-box">⚠️ <strong style="color:var(--amb)">Always verify</strong> against door placard, oil cap sticker, and owner's manual before servicing. Tire PSI always comes from the door placard only — not this app.</div>`;
  const nt=v.notes?`<div class="note-box"><div class="note-box-head">⚠️ NOTES & CAUTIONS</div><div class="note-box-txt">${esc(v.notes)}</div></div>`:'';
  return wn+bk+tbl+nt;
}

const PCATS=[
  {key:'oilFilters',icon:'🛢',label:'OIL FILTERS'},{key:'airFilters',icon:'💨',label:'AIR FILTERS'},
  {key:'cabinFilters',icon:'🌬',label:'CABIN FILTER'},{key:'fuelFilter',icon:'⛽',label:'FUEL FILTER'},
  {key:'sparkPlugs',icon:'⚡',label:'SPARK PLUGS'},{key:'glowPlugs',icon:'🔆',label:'GLOW PLUGS'},
  {key:'timingBelt',icon:'⚙️',label:'TIMING BELT'},{key:'brakes',icon:'🔴',label:'BRAKES'},
  {key:'battery',icon:'🔋',label:'BATTERY'},{key:'tires',icon:'⭕',label:'TIRES'},
  {key:'transmissionFluid',icon:'🔧',label:'TRANS FLUID'},{key:'coolant',icon:'🌡',label:'COOLANT'},
  {key:'differentialFluid',icon:'⚙️',label:'DIFF FLUID'},
];
function hasData(p,key){
  if(!p)return false;
  if(key==='brakes'){const b=p.brakes||{};return['frontPads','rearPads','rearShoes','rearDrums','frontRotors','rearRotors'].some(k=>b[k]?.length>0);}
  if(key==='tires')return!!(p.tires?.size||p.tires?.options?.length);
  return Array.isArray(p[key])&&p[key].length>0;
}

function renderPartsTab(v){
  const p=v.parts||{};
  const avail=PCATS.filter(c=>hasData(p,c.key));
  if(!avail.some(c=>c.key===S.catKey)&&avail.length)S.catKey=avail[0].key;
  const ck=S.catKey;
  let content='';
  if(ck==='brakes'){
    const b=p.brakes||{};
    if(b.frontPads?.length) content+=`<div class="sec-head">FRONT BRAKE PADS</div>${b.frontPads.map(x=>renderPartCard(x)).join('')}`;
    if(b.rearPads?.length)  content+=`<div class="sec-head">REAR BRAKE PADS</div>${b.rearPads.map(x=>renderPartCard(x)).join('')}`;
    if(b.rearShoes?.length) content+=`<div class="sec-head">⚠️ REAR DRUM BRAKE SHOES</div>${b.rearShoes.map(x=>renderPartCard(x,true)).join('')}`;
    if(b.rearDrums?.length) content+=`<div class="sec-head">REAR BRAKE DRUMS</div>${b.rearDrums.map(x=>renderPartCard(x)).join('')}`;
    if(b.frontRotors?.length)content+=`<div class="sec-head">FRONT ROTORS</div>${b.frontRotors.map(x=>renderPartCard(x)).join('')}`;
    if(b.rearRotors?.length) content+=`<div class="sec-head">REAR ROTORS</div>${b.rearRotors.map(x=>renderPartCard(x)).join('')}`;
  } else if(ck==='tires'){
    const ti=p.tires||{};
    content+=`<div class="sub-card" style="margin-bottom:12px">
      <div class="tags" style="margin-bottom:6px">
        ${ti.size?tag('tag-amb',`SIZE: ${ti.size}`):''}
        ${ti.psi?tag('tag-blu',`PSI: ${ti.psi}`):''}
      </div>
      ${ti.notes?`<div style="font-size:11px;color:var(--amb);margin-top:6px">${esc(ti.notes)}</div>`:''}
    </div>
    <div class="sec-head">TIRE OPTIONS</div>
    ${(ti.options||[]).map(o=>`<div class="sub-card"><div class="part-brand" style="margin-bottom:5px">${esc(o.brand)}</div>${renderLinks(o.links)}</div>`).join('')}`;
  } else {
    const items=p[ck];
    content=items?.length?items.map(x=>renderPartCard(x)).join(''):`<div style="color:var(--t2);font-size:13px;text-align:center;padding:24px">No parts listed for this category yet</div>`;
  }
  return`<div class="cat-btns">${avail.map(c=>`<button class="cat-btn${S.catKey===c.key?' active':''}" data-cat="${c.key}">${c.icon} ${c.label}</button>`).join('')}</div>${content}${renderVideoSection(v,ck)}`;
}

  const total=vl.reduce((s,l)=>s+(parseFloat(l.cost)||0),0);
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-size:12px;color:var(--t2)">${vl.length} records · <span style="color:var(--grn)">$${total.toLocaleString()} total</span></div>
    <button class="btn-sm" data-nav="addLog" data-addvid="${esc(v.id)}">+ ADD LOG</button>
  </div>
  ${vl.length?vl.map(l=>`<div class="log-row">
    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;margin-bottom:3px">
      <span class="log-svc">${esc(l.service)}</span>
      <span class="log-cost">${l.cost>0?'$'+Number(l.cost).toLocaleString():''}</span>
    </div>
    <div class="log-meta">
      <span>📅 ${esc(l.date)}</span>
      <span>📍 ${Number(l.mileage||0).toLocaleString()} mi</span>
      ${l.tech?`<span>🔧 ${esc(l.tech)}</span>`:''}
    </div>
    ${l.parts?`<div style="font-size:11px;color:var(--t2);margin-top:2px">🧩 ${esc(l.parts)}</div>`:''}
    ${l.notes?`<div class="log-note">${esc(l.notes)}</div>`:''}
  </div>`).join(''):`<div style="color:var(--t2);font-size:13px;text-align:center;padding:24px">No service records yet</div>`}`;
}

// ── SCREEN: Alerts Tab ────────────────────────────────────────────────────────
function renderAlertsTab(v){
  const alerts=dueAlerts(v);
  const over=alerts.filter(a=>a.status==='overdue');
  const soon=alerts.filter(a=>a.status==='due soon');
  let html='';
  if(over.length||soon.length){
    html+=`<div class="sec-head">ACTION NEEDED</div>`;
    html+=over.map(a=>`<div class="alert-item alert-overdue"><span style="font-size:12px;color:var(--txt)">${esc(a.svc)}</span>${tag('tag-red','OVERDUE')}</div>`).join('');
    html+=soon.map(a=>`<div class="alert-item alert-soon"><span style="font-size:12px;color:var(--txt)">${esc(a.svc)}</span>${tag('tag-amb','DUE SOON')}</div>`).join('');
  } else {
    html+=`<div class="all-good"><span style="color:var(--grn);font-size:12px;font-weight:600">✓ All tracked services are current</span></div>`;
  }
  html+=`<div class="sec-head">TRACKED SERVICE INTERVALS</div>`;
  html+=Object.entries(INTERVALS).map(([svc,{mi:iMi,mo:iMo}])=>{
    const last=lastLog(v.id,svc);
    return`<div class="intv-row">
      <div>
        <div style="font-size:12px;color:var(--txt)">${esc(svc)}</div>
        <div style="font-size:10px;color:var(--t2)">${iMi?`Every ${iMi.toLocaleString()} mi`:''}${iMi&&iMo?' / ':''}${iMo?`Every ${iMo} mo`:''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">${last?`<div style="font-size:11px;color:var(--t2)">${esc(last.date)}</div><div style="font-size:10px;color:var(--t2)">${Number(last.mileage||0).toLocaleString()} mi</div>`:`<span style="font-size:10px;color:var(--t3);font-style:italic">no record</span>`}</div>
    </div>`;
  }).join('');
  return html;
}

      <button class="back-btn" data-nav="${v?'vehicle':'dashboard'}" data-vid="${v?v.id:''}">←</button>

    <div style="display:flex;align-items:center;gap:10px">

    <div style="font-size:10px;color:var(--amb);letter-spacing:.1em;font-weight:700;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--bdr)">IDENTIFICATION</div>
    <div class="fld"><label>NICKNAME / FLEET ID</label><input class="inp" id="vf-nick" value="${g('nickname')}" placeholder="#8 – 2019 Ram 1500"></div>
    <div class="row2">
      <div class="fld"><label>YEAR</label><input class="inp" id="vf-year" type="number" value="${g('year')}"></div>
      <div class="fld"><label>MAKE</label><input class="inp" id="vf-make" value="${g('make')}"></div>
    </div>
    <div class="row2">
      <div class="fld"><label>MODEL</label><input class="inp" id="vf-model" value="${g('model')}"></div>
      <div class="fld"><label>TRIM</label><input class="inp" id="vf-trim" value="${g('trim')}"></div>
    </div>
    <div class="fld"><label>ENGINE</label><input class="inp" id="vf-eng" value="${g('engine')}" placeholder="5.0L Ti-VCT V8"></div>
    <div class="fld"><label>VIN</label><input class="inp" id="vf-vin" value="${g('vin')}" placeholder="17-character VIN" maxlength="17"></div>
    <div class="row2">
      <div class="fld"><label>PLATE</label><input class="inp" id="vf-plate" value="${g('plate')}"></div>
      <div class="fld"><label>COLOR</label><input class="inp" id="vf-color" value="${g('color')}"></div>
    </div>
    <div class="row2">
      <div class="fld"><label>FUEL TYPE</label><select class="inp" id="vf-fuel">${fuelOpts}</select></div>

      <div class="fld"><label>BODY TYPE (icon)</label><select class="inp" id="vf-body">${bodyOpts}</select></div>
      <div class="fld"><label>CURRENT MILEAGE</label><input class="inp" id="vf-mi" type="number" value="${g('currentMileage')}"></div>

    <div style="font-size:10px;color:var(--amb);letter-spacing:.1em;font-weight:700;margin:16px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--bdr)">VEHICLE SPECS — fill what you know, leave unknowns blank</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      ${[['vf-hp','HP / POWER','hp'],['vf-tq','TORQUE','torque'],['vf-trans','TRANSMISSION','trans'],

         ['vf-batt','BATTERY GROUP','battGrp'],['vf-plug','PLUG GAP','sparkPlugGap'],

// ── SCREEN: All Logs ──────────────────────────────────────────────────────────
function renderAllLogs(){
  const vMap=Object.fromEntries(S.vehicles.map(v=>[v.id,v]));
  const shown=S.logFilter==='all'?S.logs:S.logs.filter(l=>l.vehicleId===S.logFilter);
  const total=shown.reduce((s,l)=>s+(parseFloat(l.cost)||0),0);
  const fbtns=[{id:'all',label:`ALL (${S.logs.length})`},...S.vehicles.map(v=>({id:v.id,label:`${v.nickname.split('–')[0].trim()} (${S.logs.filter(l=>l.vehicleId===v.id).length})`}))];
  return`<div class="hdr">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <button class="back-btn" data-nav="dashboard">←</button>
      <div class="hdr-title" style="flex:1">FLEET SERVICE LOG</div>
      <button class="btn-sm" data-nav="addLog" data-addvid="">+ ADD</button>
    </div>
    <div class="filter-row">${fbtns.map(f=>`<button class="filter-btn${S.logFilter===f.id?' active':''}" data-filter="${f.id}">${esc(f.label)}</button>`).join('')}</div>
  </div>
  <div class="wrap">
    <div style="font-size:11px;color:var(--t2);margin-bottom:10px">${shown.length} records · <span style="color:var(--grn)">$${total.toLocaleString()} total</span></div>
    ${shown.length?shown.map(l=>`<div class="log-row">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;margin-bottom:3px">
        <span class="log-svc">${esc(l.service)}</span>
        <span class="log-cost">${l.cost>0?'$'+Number(l.cost).toLocaleString():''}</span>
      </div>
      <div style="font-size:10px;color:var(--t3);margin-top:2px">${esc(vMap[l.vehicleId]?.nickname||l.vehicleId)}</div>
      <div class="log-meta">
        <span>📅 ${esc(l.date)}</span>
        <span>📍 ${Number(l.mileage||0).toLocaleString()} mi</span>
        ${l.tech?`<span>🔧 ${esc(l.tech)}</span>`:''}
      </div>
      ${l.parts?`<div style="font-size:11px;color:var(--t2);margin-top:2px">🧩 ${esc(l.parts)}</div>`:''}
      ${l.notes?`<div class="log-note">${esc(l.notes)}</div>`:''}
    </div>`).join(''):`<div style="color:var(--t2);font-size:13px;text-align:center;padding:24px">No records</div>`}
  </div>`;
}

// ── Render dispatcher ─────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  switch(S.screen){
    case'dashboard':   app.innerHTML=renderDashboard();break;
    case'vehicle':     app.innerHTML=renderVehicle();break;
    case'addLog':      app.innerHTML=renderAddLog();break;
    case'addVehicle':  app.innerHTML=renderVehicleForm(null);break;
    case'editVehicle': app.innerHTML=renderVehicleForm(S.vehicles.find(v=>v.id===S.vehicleId));break;
    case'allLogs':     app.innerHTML=renderAllLogs();break;
    default:           app.innerHTML=renderDashboard();
  }
  attachEvents();
}

// ── Event binding ─────────────────────────────────────────────────────────────
function attachEvents(){
  document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>{
    const screen=el.dataset.nav,vid=el.dataset.vid||null,addvid=el.dataset.addvid;
    if(vid)S.vehicleId=vid;
    if(addvid!==undefined)S.addLogVehicleId=addvid||S.vehicleId;
    if(screen==='vehicle'&&vid)S.tab='specs';
    nav(screen);
  }));
  document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',()=>{S.tab=el.dataset.tab;render();}));
  document.querySelectorAll('[data-cat]').forEach(el=>el.addEventListener('click',()=>{S.catKey=el.dataset.cat;render();}));
  document.querySelectorAll('[data-filter]').forEach(el=>el.addEventListener('click',()=>{S.logFilter=el.dataset.filter;render();}));
  document.getElementById('btn-toggle-hidden')?.addEventListener('click',()=>{S.showHidden=!S.showHidden;render();});
  document.getElementById('btn-hide-vehicle')?.addEventListener('click',()=>{toggleHide(S.vehicleId);render();});

  // Save log entry
  document.getElementById('btn-save-log')?.addEventListener('click',async()=>{
    const vid=document.getElementById('lf-vid')?.value||'';
    const svc=document.getElementById('lf-svc')?.value||'';
    const date=document.getElementById('lf-date')?.value||'';
    const mi=parseInt(document.getElementById('lf-mi')?.value)||0;
    if(!vid||!svc||!date){alert('Please select a vehicle, service type, and date.');return;}
    const btn=document.getElementById('btn-save-log');
    btn.textContent='SAVING…';btn.disabled=true;
    try{
      await saveLog({vehicleId:vid,service:svc,date,mileage:mi,
        cost:parseFloat(document.getElementById('lf-cost')?.value)||0,
        tech:document.getElementById('lf-tech')?.value||'',
        notes:document.getElementById('lf-notes')?.value||'',
        parts:document.getElementById('lf-parts')?.value||''});
      S.vehicleId=vid;S.tab='history';nav('vehicle');
    }catch(e){
      alert('Error saving: '+e.message);
      btn.textContent='SAVE LOG ENTRY';btn.disabled=false;
    }
  });

  // Save vehicle (add or edit)
  document.getElementById('btn-save-veh')?.addEventListener('click',async()=>{
    const existId=document.getElementById('btn-save-veh').dataset.vid||'';
    const existing=existId?S.vehicles.find(v=>v.id===existId):null;
    const nick=document.getElementById('vf-nick')?.value||'';
    if(!nick){alert('Please enter a nickname for this vehicle.');return;}
    const driveVal=document.getElementById('vf-drive')?.value||'';
    const data={
      id:existId||null,
      nickname:nick,
      year:parseInt(document.getElementById('vf-year')?.value)||null,
      make:document.getElementById('vf-make')?.value||'',
      model:document.getElementById('vf-model')?.value||'',
      trim:document.getElementById('vf-trim')?.value||'',
      engine:document.getElementById('vf-eng')?.value||'',
      vin:document.getElementById('vf-vin')?.value||'',
      plate:document.getElementById('vf-plate')?.value||'',
      color:document.getElementById('vf-color')?.value||'',
      fuelType:document.getElementById('vf-fuel')?.value||'Gasoline',
      driveType:driveVal,
      bodyType:document.getElementById('vf-body')?.value||'suv',
      photoUrl:document.getElementById('vf-photo')?.value||'',
      currentMileage:parseInt(document.getElementById('vf-mi')?.value)||0,
      notes:document.getElementById('vf-notes')?.value||'',
      specs:{
        hp:document.getElementById('vf-hp')?.value||'',
        torque:document.getElementById('vf-tq')?.value||'',
        trans:document.getElementById('vf-trans')?.value||'',
        drive:driveVal,
        oilCap:document.getElementById('vf-oilcap')?.value||'',
        oilType:document.getElementById('vf-oiltype')?.value||'',
        coolantCap:document.getElementById('vf-coolant')?.value||'',
        fuelCap:document.getElementById('vf-fuelcap')?.value||'',
        tireSize:document.getElementById('vf-tire')?.value||'',
        tirePSI:document.getElementById('vf-psi')?.value||'— see door placard',
        battGrp:document.getElementById('vf-batt')?.value||'',
        sparkPlugGap:document.getElementById('vf-plug')?.value||'',
        towCap:document.getElementById('vf-tow')?.value||'',
      },
      parts:existing?.parts||EP(),
    };
    const btn=document.getElementById('btn-save-veh');
    btn.textContent='SAVING…';btn.disabled=true;
    try{
      const savedId=await saveVehicle(data);
      S.vehicleId=savedId||existId;
      nav(existId?'vehicle':'dashboard');
    }catch(e){
      alert('Error saving vehicle: '+e.message);
      btn.textContent=existId?'SAVE CHANGES':'ADD TO GARAGE';
      btn.disabled=false;
    }
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init(){
  try{
    await initDB();
    setLoad('📡 CONNECTING TO LIVE DATA…');
    listenDB();
    // Wait for first snapshot
    await new Promise(res=>{
      const u=onSnapshot(vcol,snap=>{
        S.vehicles=snap.docs.map(d=>({...d.data(),id:d.id}));
        S.vehicles.sort((a,b)=>(parseInt(a.id.replace('v',''))||0)-(parseInt(b.id.replace('v',''))||0));
        u();res();
      });
    });
    S.loaded=true;
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    render();
  }catch(e){
    document.getElementById('loading').innerHTML=`
      <div style="color:var(--red);max-width:320px;text-align:center">
        <div style="font-size:14px;font-weight:700;margin-bottom:8px">CONNECTION ERROR</div>
        <div style="font-size:12px;color:var(--t2);margin-bottom:8px">${esc(e.message)}</div>
        <div style="font-size:11px;color:var(--t2)">Check that Firestore is in Test Mode in your Firebase console.</div>
      </div>`;
  }
}
init();
</script>
</body>
</html>
