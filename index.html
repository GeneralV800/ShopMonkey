<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🏠 The Garage</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06070e;--pnl:#0c0d16;--card:#0f1019;--bdr:#181929;
  --amb:#f5a100;--amb2:#ffc240;--red:#e94444;--grn:#17c97f;
  --blu:#4ca8f7;--txt:#dde2f0;--t2:#7c8499;--t3:#3a4158;
}
body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
a{color:var(--amb);text-decoration:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--pnl)}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999}
#loading .spinner{width:28px;height:28px;border:2px solid var(--bdr);border-top-color:var(--amb);border-radius:50%;animation:spin .8s linear infinite}
#loading .lbl{font-size:11px;color:var(--t2);letter-spacing:.12em}
@keyframes spin{to{transform:rotate(360deg)}}
.hdr{background:var(--pnl);border-bottom:1px solid var(--bdr);padding:12px 16px}
.hdr-row{display:flex;align-items:center;gap:10px}
.back-btn{background:none;border:none;color:var(--amb);font-size:20px;padding:0 4px;line-height:1;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:.02em;flex:1}
.hdr-sub{font-size:11px;color:var(--t2);margin-top:2px}
.wrap{padding:14px 16px;max-width:640px;margin:0 auto;padding-bottom:80px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:13px 15px;margin-bottom:10px}
.card-warn{border-color:color-mix(in srgb,var(--red) 40%,transparent)}
.card-amber{border-color:color-mix(in srgb,var(--amb) 30%,transparent)}
.sub-card{background:#0a0b14;border:1px solid var(--bdr);border-radius:6px;padding:10px 12px;margin-bottom:8px}
.sub-card-hl{background:#1a1200;border-color:color-mix(in srgb,var(--amb) 40%,transparent)}
.sub-card-red{background:#1a0000;border-color:color-mix(in srgb,var(--red) 40%,transparent)}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.tag-amb{background:color-mix(in srgb,var(--amb) 15%,transparent);color:var(--amb);border:1px solid color-mix(in srgb,var(--amb) 30%,transparent)}
.tag-red{background:color-mix(in srgb,var(--red) 15%,transparent);color:var(--red);border:1px solid color-mix(in srgb,var(--red) 30%,transparent)}
.tag-grn{background:color-mix(in srgb,var(--grn) 15%,transparent);color:var(--grn);border:1px solid color-mix(in srgb,var(--grn) 30%,transparent)}
.tag-blu{background:color-mix(in srgb,var(--blu) 15%,transparent);color:var(--blu);border:1px solid color-mix(in srgb,var(--blu) 30%,transparent)}
.tag-dim{background:color-mix(in srgb,var(--t3) 20%,transparent);color:var(--t2);border:1px solid color-mix(in srgb,var(--t3) 30%,transparent)}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.sec-head{font-size:10px;color:var(--t2);letter-spacing:.1em;font-weight:700;text-transform:uppercase;margin:16px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--bdr)}
.part-brand{font-size:13px;color:var(--txt);font-weight:600}
.part-pn{font-size:11px;color:var(--amb2);font-family:'Courier New',monospace;letter-spacing:.03em}
.part-note{font-size:11px;color:var(--t2);margin:3px 0;line-height:1.5}
.part-note-warn{color:var(--red)}
.links{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.link-btn{font-size:10px;color:var(--amb);padding:3px 8px;border:1px solid color-mix(in srgb,var(--amb) 30%,transparent);border-radius:3px;display:inline-flex;gap:4px;align-items:center;transition:background .15s}
.link-btn:hover{background:color-mix(in srgb,var(--amb) 10%,transparent)}
.link-price{color:var(--t2)}
.tabs{display:flex;gap:1px;overflow-x:auto;margin-top:10px;border-bottom:1px solid var(--bdr)}
.tab-btn{padding:8px 13px;border:none;border-bottom:2px solid transparent;background:none;color:var(--t2);font-size:11px;font-weight:700;letter-spacing:.05em;white-space:nowrap;transition:color .15s,border-color .15s}
.tab-btn.active{color:var(--amb);border-bottom-color:var(--amb)}
.cat-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat-btn{padding:6px 11px;border-radius:4px;border:1px solid var(--bdr);background:none;color:var(--t2);font-size:11px;transition:all .15s;display:flex;gap:4px;align-items:center}
.cat-btn.active{border-color:var(--amb);background:color-mix(in srgb,var(--amb) 8%,transparent);color:var(--amb)}
.inp{background:#0a0b14;border:1px solid #1e2030;border-radius:5px;padding:9px 11px;color:var(--txt);font-size:13px;width:100%;outline:none;transition:border-color .15s}
.inp:focus{border-color:color-mix(in srgb,var(--amb) 50%,transparent)}
.btn-primary{padding:11px 20px;border-radius:4px;border:none;background:var(--amb);color:#000;font-size:12px;font-weight:700;letter-spacing:.05em;transition:background .15s}
.btn-primary:hover{background:var(--amb2)}
.btn-ghost{padding:11px 16px;border-radius:4px;border:1px solid var(--bdr);background:none;color:var(--t2);font-size:12px;transition:border-color .15s}
.btn-ghost:hover{border-color:var(--t2)}
.btn-sm{padding:6px 13px;border-radius:4px;border:none;background:var(--amb);color:#000;font-size:11px;font-weight:700;letter-spacing:.04em}
.btn-sm-ghost{padding:6px 12px;border-radius:4px;border:1px solid var(--bdr);background:none;color:var(--t2);font-size:10px;letter-spacing:.06em}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:10px;color:var(--t2);letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
.row2{display:flex;gap:10px}
.row2>*{flex:1}
.stat-row{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-lbl{font-size:10px;color:var(--t2);letter-spacing:.06em;text-transform:uppercase}
.stat-val{font-size:18px;font-weight:700}
.divider{width:1px;background:var(--bdr)}
.spec-row{display:flex;padding:9px 14px;border-bottom:1px solid var(--bdr)}
.spec-key{font-size:10px;color:var(--t2);letter-spacing:.07em;text-transform:uppercase;min-width:140px;flex-shrink:0;padding-top:2px}
.spec-val{font-size:13px;font-family:'Courier New',monospace;line-height:1.5}
.spec-val-warn{color:var(--red)}
.note-box{background:#1a0d00;border:1px solid color-mix(in srgb,var(--amb) 30%,transparent);border-radius:6px;padding:12px 14px;margin-top:12px}
.note-box-head{font-size:10px;color:var(--amb);letter-spacing:.08em;font-weight:700;margin-bottom:6px}
.note-box-txt{font-size:12px;color:var(--txt);line-height:1.7;white-space:pre-wrap}
.log-row{background:#0a0b14;border:1px solid var(--bdr);border-radius:6px;padding:10px 13px;margin-bottom:8px}
.log-svc{font-size:12px;color:var(--amb);font-weight:600}
.log-cost{font-size:11px;color:var(--grn);font-family:'Courier New',monospace}
.log-meta{font-size:11px;color:var(--t2);display:flex;gap:12px;flex-wrap:wrap;margin-top:3px}
.log-note{font-size:11px;color:var(--txt);line-height:1.5;margin-top:4px}
.log-veh{font-size:10px;color:var(--t3);margin-top:2px}
.add-dashed{width:100%;background:none;border:2px dashed var(--bdr);border-radius:8px;padding:16px;text-align:center;color:var(--t2);font-size:12px;letter-spacing:.06em;margin-top:6px;transition:border-color .15s}
.add-dashed:hover{border-color:var(--t2)}
.alert-item{border-radius:6px;padding:9px 13px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.alert-overdue{background:color-mix(in srgb,var(--red) 10%,transparent);border:1px solid color-mix(in srgb,var(--red) 30%,transparent)}
.alert-soon{background:color-mix(in srgb,var(--amb) 8%,transparent);border:1px solid color-mix(in srgb,var(--amb) 25%,transparent)}
.all-good{background:color-mix(in srgb,var(--grn) 8%,transparent);border:1px solid color-mix(in srgb,var(--grn) 25%,transparent);border-radius:6px;padding:12px 16px;margin-bottom:16px;text-align:center}
.intv-row{background:#0a0b14;border:1px solid var(--bdr);border-radius:5px;padding:8px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.intv-svc{font-size:12px;color:var(--txt)}
.intv-schedule{font-size:10px;color:var(--t2)}
.intv-last{text-align:right;flex-shrink:0}
.intv-last-date{font-size:11px;color:var(--t2)}
.intv-last-mi{font-size:10px;color:var(--t2)}
.tire-info{background:#0a0b14;border:1px solid var(--bdr);border-radius:6px;padding:12px 14px;margin-bottom:12px}
.fleet-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:12px;border:1px solid var(--bdr);border-radius:6px;overflow:hidden}
.fstat{padding:10px 12px;border-right:1px solid var(--bdr);text-align:center}
.fstat:last-child{border-right:none}
.fstat-lbl{font-size:9px;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.fstat-val{font-size:16px;font-weight:700}
.vh-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.vh-name{font-size:14px;font-weight:700;color:var(--txt)}
.vh-eng{font-size:11px;color:var(--t2)}
.vh-mi{font-size:13px;font-weight:700;color:var(--amb);font-family:'Courier New',monospace}
.vh-cost{font-size:10px;color:var(--t2)}
.vh-last{font-size:10px;color:var(--t3);margin-top:3px}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;margin-top:10px}
.filter-btn{padding:5px 11px;border-radius:3px;border:1px solid var(--bdr);background:none;color:var(--t2);font-size:10px;white-space:nowrap;letter-spacing:.04em}
.filter-btn.active{border-color:var(--amb);background:color-mix(in srgb,var(--amb) 8%,transparent);color:var(--amb)}
.empty{color:var(--t2);font-size:13px;text-align:center;padding:24px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);display:inline-block;margin-left:6px;box-shadow:0 0 6px var(--grn)}
.sync-dot.offline{background:var(--red);box-shadow:0 0 6px var(--red)}
@media(max-width:400px){.fleet-stats{grid-template-columns:repeat(2,1fr)}.fstat:nth-child(2){border-right:none}.fstat:nth-child(3){border-top:1px solid var(--bdr)}.fstat:nth-child(4){border-top:1px solid var(--bdr);border-right:none}}
</style>
</head>

// Auto-generate extra store links for a part (Walmart, O'Reilly, NAPA, AutoZone)
// skips any store already present in the existing links array
function autoStoreLinks(brand,pn,existingLinks){
  if(!pn||pn==='—'||pn==='-')return[];
  const q=`${brand} ${pn}`.trim();
  const have=new Set((existingLinks||[]).map(l=>l.store));
  const extras=[];
  if(!have.has('AutoZone'))  extras.push(L('AutoZone',q,null));
  if(!have.has('Walmart'))   extras.push(L('Walmart',q,null));
  if(!have.has("O'Reilly"))  extras.push(L("O'Reilly",pn,null));
  if(!have.has('NAPA'))      extras.push(L('NAPA',q,null));
  return extras;
}

// ── DB ────────────────────────────────────────────────────────────────────────
async function seedIfEmpty(){
  const snap=await getDocs(vcol);
  if(!snap.empty)return;
  const batch=writeBatch(db);
  SEED_VEHICLES.forEach(v=>{const r=doc(vcol,v.id);batch.set(r,v);});
  SEED_LOGS.forEach((l,i)=>{const r=doc(lcol,`log_${String(i+1).padStart(3,'0')}`);batch.set(r,l);});
  await batch.commit();
}

async function saveVehicle(data){
  if(data.id){await setDoc(doc(vcol,data.id),data);}
  else{
    const id='v'+Date.now();
    data.id=id;
    data.parts=data.parts||SEED_VEHICLES[0].parts;
    await setDoc(doc(vcol,id),data);
  }
}

async function addLog(data){
  await addDoc(lcol,data);
  const v=S.vehicles.find(v=>v.id===data.vehicleId);
  if(v&&data.mileage>=(v.currentMileage||0)){
    await updateDoc(doc(vcol,data.vehicleId),{currentMileage:data.mileage});
  }
}

function setupListeners(){
  onSnapshot(vcol,snap=>{
    S.vehicles=snap.docs.map(d=>({...d.data(),id:d.id}));
    S.vehicles.sort((a,b)=>{
      const na=parseInt(a.id.replace('v',''));
      const nb=parseInt(b.id.replace('v',''));
      return na-nb;
    });
    if(!S.loading)render();
  });
  onSnapshot(query(lcol,orderBy('date','desc')),snap=>{
    S.logs=snap.docs.map(d=>({...d.data(),id:d.id}));
    if(!S.loading)render();
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function nav(screen,opts={}){
  Object.assign(S,{screen},opts);
  render();
  window.scrollTo(0,0);
}

function lastLog(vid,svc){
  return S.logs.filter(l=>l.vehicleId===vid&&l.service===svc).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
}

function dueAlerts(v){
  const alerts=[];
  const now=new Date();
  Object.entries(INTERVALS).forEach(([svc,{mi:iMi,mo:iMo}])=>{
    const last=lastLog(v.id,svc);
    if(!last)return;
    const miSince=(v.currentMileage||0)-last.mileage;
    const moSince=(now-new Date(last.date))/(1000*60*60*24*30.44);
    const miPct=iMi?miSince/iMi:0;
    const moPct=iMo?moSince/iMo:0;
    const pct=Math.max(miPct,moPct);
    if(pct>=1)alerts.push({svc,status:'overdue',pct});
    else if(pct>=0.8)alerts.push({svc,status:'due soon',pct});
  });
  return alerts.sort((a,b)=>b.pct-a.pct);
}

function renderLinks(links){
  if(!links||!links.length)return'';
  return`<div class="links">${links.map(l=>`<a class="link-btn" href="${esc(l.url)}" target="_blank" rel="noopener">🔗 ${esc(l.store)}<span class="link-price">${l.price?esc(l.price):''}</span></a>`).join('')}</div>`;
}

function renderPartCard(p,hl=false){
  const isWarn=p.notes&&(p.notes.startsWith('⚠️')||p.notes.includes('MANDATORY')||p.notes.includes('CRITICAL')||p.notes.includes('ONLY'));
  const curated=p.links||[];
  const extras=autoStoreLinks(p.brand,p.pn,curated);
  const extraHtml=extras.length?`<div class="links" style="margin-top:4px;padding-top:4px;border-top:1px solid var(--bdr)">${extras.map(l=>`<a class="link-btn" style="color:var(--t2);border-color:color-mix(in srgb,var(--t2) 25%,transparent)" href="${esc(l.url)}" target="_blank" rel="noopener">🔗 ${esc(l.store)}</a>`).join('')}</div>`:'';
  return`<div class="sub-card${hl?' sub-card-hl':''}${isWarn?' sub-card-red':''}">
    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;margin-bottom:3px">
      <span class="part-brand">${esc(p.brand)}</span>

    ${p.notes?`<div class="part-note${isWarn?' part-note-warn':''}">${esc(p.notes)}</div>`:''}

}

function renderSpecsTab(v){
  const rows=Object.entries(v.specs||{});
  const labels={hp:'HP / POWER',torque:'TORQUE',trans:'TRANSMISSION',drive:'DRIVE',fuelCap:'FUEL CAPACITY',oilCap:'OIL CAPACITY',oilType:'OIL TYPE',coolantCap:'COOLANT CAPACITY',tireSize:'TIRE SIZE',battGrp:'BATTERY GROUP',tirePSI:'TIRE PSI',sparkPlugGap:'SPARK PLUG GAP',towCap:'TOW CAPACITY'};
  const table=`<div style="background:#0a0b14;border:1px solid var(--bdr);border-radius:6px;overflow:hidden;margin-bottom:14px">
    ${rows.map(([k,val],i)=>{
      const isWarn=String(val).includes('MANDATORY')||String(val).includes('ONLY')||String(val).includes('TBD')||String(val).includes('verify');
      return`<div class="spec-row"${i>0?'':' style="border-top:none"'}>
        <div class="spec-key">${esc(labels[k]||k)}</div>
        <div class="spec-val${isWarn?' spec-val-warn':''}">${esc(val)}</div>
      </div>`;
    }).join('')}

  const notes=v.notes?`<div class="note-box"><div class="note-box-head">⚠️ NOTES & CAUTIONS</div><div class="note-box-txt">${esc(v.notes)}</div></div>`:'';
  return table+notes;
}

  {key:'oilFilters',icon:'🛢',label:'OIL FILTERS'},
  {key:'airFilters',icon:'💨',label:'AIR FILTERS'},
  {key:'cabinFilters',icon:'🌬',label:'CABIN FILTER'},
  {key:'fuelFilter',icon:'⛽',label:'FUEL FILTER'},
  {key:'sparkPlugs',icon:'⚡',label:'SPARK PLUGS'},
  {key:'glowPlugs',icon:'🔆',label:'GLOW PLUGS'},
  {key:'timingBelt',icon:'⚙️',label:'TIMING BELT'},
  {key:'brakes',icon:'🔴',label:'BRAKES'},
  {key:'battery',icon:'🔋',label:'BATTERY'},
  {key:'tires',icon:'⭕',label:'TIRES'},
  {key:'transmissionFluid',icon:'🔧',label:'TRANS FLUID'},
  {key:'coolant',icon:'🌡',label:'COOLANT'},
  {key:'differentialFluid',icon:'⚙️',label:'DIFF FLUID'},
];

function partsHasData(v,key){
  const p=v.parts||{};
  if(!p[key])return false;
  if(key==='brakes')return true;
  if(key==='tires')return!!(p.tires&&p.tires.size);
  if(Array.isArray(p[key]))return p[key].length>0;
  return Object.keys(p[key]).length>0;
}

function renderPartsTab(v){
  const avail=PARTS_CATS.filter(c=>partsHasData(v,c.key));
  const catBtns=avail.map(c=>`<button class="cat-btn${S.catKey===c.key?' active':''}" data-cat="${c.key}">${c.icon} ${c.label}</button>`).join('');
  let content='';
  const p=v.parts||{};
  const ck=S.catKey;
  if(ck==='brakes'){
    const b=p.brakes||{};
    content+=b.frontPads?.length?`<div class="sec-head">FRONT BRAKE PADS</div>${b.frontPads.map(x=>renderPartCard(x)).join('')}`:'';
    content+=b.rearPads?.length?`<div class="sec-head">REAR BRAKE PADS</div>${b.rearPads.map(x=>renderPartCard(x)).join('')}`:'';
    content+=b.rearShoes?.length?`<div class="sec-head">⚠️ REAR BRAKE SHOES (DRUMS)</div>${b.rearShoes.map(x=>renderPartCard(x,true)).join('')}`:'';
    content+=b.rearDrums?.length?`<div class="sec-head">REAR BRAKE DRUMS</div>${b.rearDrums.map(x=>renderPartCard(x)).join('')}`:'';
    content+=b.frontRotors?.length?`<div class="sec-head">FRONT ROTORS</div>${b.frontRotors.map(x=>renderPartCard(x)).join('')}`:'';
    content+=b.rearRotors?.length?`<div class="sec-head">REAR ROTORS</div>${b.rearRotors.map(x=>renderPartCard(x)).join('')}`:'';
  } else if(ck==='tires'){
    const ti=p.tires||{};
    content+=`<div class="tire-info">
      <div class="tags" style="margin-bottom:${ti.notes?'8':'0'}px">
        ${ti.size?`<span class="tag tag-amb">SIZE: ${esc(ti.size)}</span>`:''}
        ${ti.psi?`<span class="tag tag-blu">PSI: ${esc(ti.psi)}</span>`:''}
      </div>
      ${ti.notes?`<div style="font-size:11px;color:var(--amb);margin-top:6px">${esc(ti.notes)}</div>`:''}
    </div>`;
    content+=`<div class="sec-head">TIRE OPTIONS</div>`;
    content+=(ti.options||[]).map(o=>`<div class="sub-card"><div class="part-brand" style="margin-bottom:5px">${esc(o.brand)}</div>${renderLinks(o.links)}</div>`).join('');
  } else {
    const items=p[ck];
    if(!items||!items.length) content='<div class="empty">No parts listed for this category</div>';
    else content=items.map(x=>renderPartCard(x)).join('');
  }
  return`<div class="cat-btns">${catBtns}</div>${content}${renderVideoSection(v,ck)}`;
}

function renderAlertsTab(v){
  const alerts=dueAlerts(v);
  const over=alerts.filter(a=>a.status==='overdue');
  const soon=alerts.filter(a=>a.status==='due soon');
  let html='';
  if(over.length||soon.length){
    html+=`<div class="sec-head">ACTION NEEDED</div>`;
    html+=over.map(a=>`<div class="alert-item alert-overdue"><span style="font-size:12px;color:var(--txt)">${esc(a.svc)}</span><span class="tag tag-red">OVERDUE</span></div>`).join('');
    html+=soon.map(a=>`<div class="alert-item alert-soon"><span style="font-size:12px;color:var(--txt)">${esc(a.svc)}</span><span class="tag tag-amb">DUE SOON</span></div>`).join('');
  } else {
    html+=`<div class="all-good"><span style="color:var(--grn);font-size:12px;font-weight:600">✓ All tracked services are current</span></div>`;
  }
  html+=`<div class="sec-head">TRACKED SERVICE INTERVALS</div>`;
  html+=Object.entries(INTERVALS).map(([svc,{mi:iMi,mo:iMo}])=>{
    const last=lastLog(v.id,svc);
    return`<div class="intv-row">
      <div><div class="intv-svc">${esc(svc)}</div>

  return html;

// ── Render dispatcher ─────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  switch(S.screen){
    case'dashboard': app.innerHTML=renderDashboard();break;
    case'vehicle':   app.innerHTML=renderVehicle();break;
    case'addLog':    app.innerHTML=renderAddLog();break;
    case'addVehicle':app.innerHTML=renderVehicleForm(null);break;
    case'editVehicle':app.innerHTML=renderVehicleForm(S.vehicles.find(v=>v.id===S.vehicleId));break;
    case'allLogs':   app.innerHTML=renderAllLogs();break;
    default:         app.innerHTML=renderDashboard();
  }
  attachEvents();
}

// ── Events ────────────────────────────────────────────────────────────────────
function attachEvents(){
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click',e=>{
      const screen=el.dataset.nav;
      const vid=el.dataset.vid||null;
      const addvid=el.dataset.addvid!==undefined?el.dataset.addvid:null;
      if(vid)S.vehicleId=vid;
      if(addvid!==null)S.addLogVehicleId=addvid||S.vehicleId;
      if(screen==='vehicle'&&vid)S.tab='specs';
      nav(screen,vid?{vehicleId:vid}:{});
    });
  });
  document.querySelectorAll('[data-tab]').forEach(el=>{
    el.addEventListener('click',()=>{S.tab=el.dataset.tab;render();});
  });
  document.querySelectorAll('[data-cat]').forEach(el=>{
    el.addEventListener('click',()=>{S.catKey=el.dataset.cat;render();});
  });
  document.querySelectorAll('[data-filter]').forEach(el=>{
    el.addEventListener('click',()=>{S.logFilter=el.dataset.filter;render();});
  });
  document.querySelectorAll('[data-vid]').forEach(el=>{
    if(el.dataset.nav)return;
    el.addEventListener('click',()=>{S.vehicleId=el.dataset.vid;nav('vehicle');});
  });

  // Save log
  const saveLogBtn=document.getElementById('save-log-btn');
  if(saveLogBtn){
    saveLogBtn.addEventListener('click',async()=>{
      const vid=document.getElementById('log-vid')?.value;
      const svc=document.getElementById('log-svc')?.value;
      const date=document.getElementById('log-date')?.value;
      const mi=parseInt(document.getElementById('log-mi')?.value)||0;
      if(!vid||!svc||!date){alert('Please fill in Vehicle, Service, and Date.');return;}
      saveLogBtn.textContent='SAVING…';saveLogBtn.disabled=true;
      try{
        await addLog({vehicleId:vid,service:svc,date,mileage:mi,
          cost:parseFloat(document.getElementById('log-cost')?.value)||0,
          tech:document.getElementById('log-tech')?.value||'',
          notes:document.getElementById('log-notes')?.value||'',
          parts:document.getElementById('log-parts')?.value||''});
        S.vehicleId=vid;S.tab='history';nav('vehicle');
      }catch(e){alert('Error saving log: '+e.message);saveLogBtn.textContent='SAVE LOG ENTRY';saveLogBtn.disabled=false;}
    });
  }

  // Save vehicle
  const saveVehBtn=document.getElementById('save-veh-btn');
  if(saveVehBtn){
    saveVehBtn.addEventListener('click',async()=>{
      const existId=saveVehBtn.dataset.vid;
      const existing=existId?S.vehicles.find(v=>v.id===existId):null;
      const data={
        id:existId||null,
        nickname:document.getElementById('vf-nick')?.value||'',
        year:parseInt(document.getElementById('vf-year')?.value)||null,
        make:document.getElementById('vf-make')?.value||'',
        model:document.getElementById('vf-model')?.value||'',
        trim:document.getElementById('vf-trim')?.value||'',
        engine:document.getElementById('vf-eng')?.value||'',
        vin:document.getElementById('vf-vin')?.value||'',
        plate:document.getElementById('vf-plate')?.value||'',
        color:document.getElementById('vf-color')?.value||'',
        fuelType:document.getElementById('vf-fuel')?.value||'Gasoline',
        driveType:document.getElementById('vf-drive')?.value||'',
        currentMileage:parseInt(document.getElementById('vf-mi')?.value)||0,
        notes:document.getElementById('vf-notes')?.value||'',
        specs:{
          hp:document.getElementById('vf-hp')?.value||'',
          torque:document.getElementById('vf-tq')?.value||'',
          trans:document.getElementById('vf-trans')?.value||'',
          drive:document.getElementById('vf-drive')?.value||'',
          oilCap:document.getElementById('vf-oilcap')?.value||'',
          oilType:document.getElementById('vf-oiltype')?.value||'',
          coolantCap:document.getElementById('vf-coolant')?.value||'',
          fuelCap:document.getElementById('vf-fuelcap')?.value||'',
          tireSize:document.getElementById('vf-tire')?.value||'',
          tirePSI:document.getElementById('vf-psi')?.value||'',
          battGrp:document.getElementById('vf-batt')?.value||'',
          sparkPlugGap:document.getElementById('vf-plug')?.value||'',
          towCap:document.getElementById('vf-tow')?.value||'',
        },
        parts:existing?.parts||{oilFilters:[],airFilters:[],cabinFilters:[],sparkPlugs:[],brakes:{frontPads:[],rearPads:[],rearShoes:[],rearDrums:[],frontRotors:[],rearRotors:[]},battery:[],tires:{size:'',psi:'',options:[]},transmissionFluid:[],coolant:[],differentialFluid:[]},
      };
      if(!data.nickname){alert('Please enter a nickname for this vehicle.');return;}
      saveVehBtn.textContent='SAVING…';saveVehBtn.disabled=true;
      try{
        await saveVehicle(data);
        S.vehicleId=data.id||existId;
        nav(existId?'vehicle':'dashboard');
      }catch(e){alert('Error saving vehicle: '+e.message);saveVehBtn.textContent=existId?'SAVE CHANGES':'ADD VEHICLE TO FLEET';saveVehBtn.disabled=false;}
    });
  }
}

  try{
    await seedIfEmpty();
    setupListeners();
    // Wait for first data load
    await new Promise(res=>{
      const unsub=onSnapshot(vcol,snap=>{
        S.vehicles=snap.docs.map(d=>({...d.data(),id:d.id}));
        unsub();res();
      });
    });
    S.loading=false;
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    render();
  }catch(e){
    document.getElementById('loading').innerHTML=`<div style="color:#e94444;text-align:center;padding:24px"><div style="font-size:14px;font-weight:700;margin-bottom:8px">CONNECTION ERROR</div><div style="font-size:12px;color:#7c8499">${esc(e.message)}</div><div style="font-size:11px;color:#7c8499;margin-top:8px">Check Firestore is enabled in test mode.</div></div>`;
  }
}

init();
</script>
</body>
</html>
